name: hishells
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - tqdm
  - pyyaml

  # Astronomy / FITS
  - astropy
  - spectral-cube
  - radio-beam
  - reproject
  - regions
  - astroquery

  # Image processing & classical ML
  - scikit-image
  - scikit-learn

  # Bayesian inference (used by hishells.catalog_bayes / 01_explore_catalog)
  - pymc>=5.10
  - arviz>=0.17

  # Deep learning (Apple Silicon: pytorch wheels include MPS support)
  - pytorch
  - torchvision

  # Notebooks
  - jupyterlab
  - ipykernel

  # Tests
  - pytest
  - pytest-xdist

  # Parallel HTTP downloader used by scripts/fetch_things.py
  - aria2

  # Install the local package in editable mode so notebooks/scripts can
  # `import hishells` after `conda env update -f environment.yml --prune`.
  - pip:
      - -e .
