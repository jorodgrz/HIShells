cube_path: raw/NGC_6946/cube.fits
output_root: data/NGC_6946

catalogs:
  holes_dat: raw/NGC_6946/bagetakos_table7.dat
  target_galaxy: "NGC 6946"
  hv_scale: auto
  use_circular: true

galaxy:
  ra_deg: 308.717500
  dec_deg: 60.154000
  pa_deg: 243.0
  inc_deg: 33.0
  vsys_kms: null
  distance_mpc: 5.90
  beam_fwhm_arcsec: null

pv:
  grid:
    frame: galaxy
    pa_convention: astro
    pa_delta_deg: 0
    x_extent_arcsec: 360
    y_extent_arcsec: 360
    x_step_arcsec: 8
    y_step_arcsec: 8
    slit_width_pix: 3
    margin_arcsec: 0
    pos_step_pix: 0.5
  axes:
    include_major_minor: true

label:
  circle:
    min_axis_ratio: 0.8
    vexp_fallback_channels: 3
    dilate_vel_channels: 1
  inflate_pix: 8
  margin_pix: 2
  pos_expand_cols: 2
  min_vband_channels: 6
  vband_dilate_ch: 1
  hv_scale: auto
  hv_offset_kms: 0.0

train:
  pos_fraction: 0.5
  patch_pos: 512
  patch_vel: 96
  vel_channels: 128
  norm_method: zscore_galaxy_only
  splits: {train_frac: 0.7, val_frac: 0.2, test_frac: 0.1}

model: {base_filters: 32, depth: 4, dilation_rate: 2, dropout: 0.0}
optim:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 4
  epochs: 60
  loss: focal_tversky
  focal_tversky: {alpha: 0.7, beta: 0.3, gamma: 0.75}

post:
  min_component_area_pv: [6, 5]
  ellipse_axis_ratio_range: [0.4, 2.5]
  min_perimeter_pix: 40

aggregate:
  vote_sigma_pix: 5
  nms_radius_pix: 12
  min_radius_beams: 2.5
  max_thickness_frac: 0.4
